# Serves the static Astro build and reverse-proxies /api → the FastAPI backend.
# Routing the API under /api keeps everything same-origin (no CORS) and avoids the
# /students name clash between a frontend page and an API endpoint.

# Resolve the real client IP from the proxy chain so the auth rate-limit keys on
# the actual caller, not on Caddy. Trust ONLY the private Docker network Caddy
# runs on (never 0.0.0.0/0): with an all-trusting recursive walk, a client could
# spoof X-Forwarded-For and mint a fresh rate-limit bucket per request. Caddy
# appends the true client as the LAST X-Forwarded-For entry, so with recursion
# off nginx takes that trailing value, which the client cannot forge.
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;
real_ip_header X-Forwarded-For;
real_ip_recursive off;

# Throttle the auth endpoints (login/refresh/logout) to stop username spraying
# and deliberate account lockout — ~10 req/min per client IP, small burst.
limit_req_zone $binary_remote_addr zone=authlimit:10m rate=10r/m;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 10m;

    # Auth endpoints — rate-limited (more specific than /api/, so nginx picks this).
    location /api/auth/ {
        limit_req zone=authlimit burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://api:8000/auth/;     # strips the /api prefix
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # API → backend container (service name "api" on the compose network).
    location /api/ {
        proxy_pass http://api:8000/;          # trailing slash strips the /api prefix
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Runtime config — never cache (it re-points the app at the API).
    location = /config.json {
        add_header Cache-Control "no-store";
    }

    # Long-cache the hashed asset bundles.
    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Static frontend with Astro clean-URL folders.
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }
}
